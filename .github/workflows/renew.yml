name: Katabump Auto Renew

on:
  schedule:
    # 每天 UTC 0点，北京时间 8点运行
    - cron: '20 18,8 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb curl
          npm install
          npx playwright install-deps chrome

      - name: Pick Webshare proxy
        env:
          WEBSHARE_PROXY_LIST_URL: ${{ secrets.WEBSHARE_PROXY_LIST_URL }}
        run: |
          if [ -z "$WEBSHARE_PROXY_LIST_URL" ]; then
            echo "WEBSHARE_PROXY_LIST_URL is empty, running without Webshare proxy."
            touch proxies.txt
            exit 0
          fi

          echo "Downloading Webshare proxy list..."
          curl -fsSL "${WEBSHARE_PROXY_LIST_URL}" -o proxies.txt
          echo "Proxy list downloaded. Total lines: $(wc -l < proxies.txt)"

          # 选出一个默认的写入环境变量，供不走重试逻辑的地方使用
          PROXY_LINE=$(grep -v '^[[:space:]]*$' proxies.txt | shuf -n 1)
          if [ -n "$PROXY_LINE" ]; then
            IP=$(echo "$PROXY_LINE" | cut -d: -f1)
            PORT=$(echo "$PROXY_LINE" | cut -d: -f2)
            PROXY_USER=$(echo "$PROXY_LINE" | cut -d: -f3)
            PROXY_PASS=$(echo "$PROXY_LINE" | cut -d: -f4)
            HTTP_PROXY_VALUE="http://${PROXY_USER}:${PROXY_PASS}@${IP}:${PORT}"
            
            echo "::add-mask::${HTTP_PROXY_VALUE}"
            echo "HTTP_PROXY=${HTTP_PROXY_VALUE}" >> "$GITHUB_ENV"
            echo "HTTPS_PROXY=${HTTP_PROXY_VALUE}" >> "$GITHUB_ENV"
            echo "Initial Webshare proxy selected: ${IP}:${PORT}"
          fi
      - name: Run Renew Script
        env:
          USERS_JSON: ${{ secrets.USERS_JSON }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node action_renew.js

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
